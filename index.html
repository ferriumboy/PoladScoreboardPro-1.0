
<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futbol Pro - Premium Turnir</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Outfit:wght@400;600;800&family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@300;400;500;600;700&family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1" />
    <style>
        :root {
            --deep-navy: #010412;
            --royal-blue: #001242;
            --ucl-blue: #0033a0;
            --neon-green: #39FF14;
            --cyan-stats: #00f2ff;
            --card-bg-start: rgba(0, 20, 60, 0.85);
            --card-bg-end: rgba(0, 10, 30, 0.95);
            --primary: #00ff88;
            --primary-dark: #00cc6a;
            --navy-deep: #020412;
            --navy-light: #0a0f29;
            --glass-surface: rgba(2, 4, 18, 0.85);
            --glass-border: rgba(255, 255, 255, 0.05);
            --gold: #facc15;
            --gold-glow: rgba(250, 204, 21, 0.4);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--deep-navy);
            min-height: 100vh;
            color: white;
            overflow-x: hidden;
        }

        .ucl-bg-pattern {
            background-color: #000c2d;
            background-image: radial-gradient(circle at 50% 50%, #001a57 0%, #010412 100%);
            background-size: cover;
            background-blend-mode: overlay;
        }

        .premium-glass-card {
            background: linear-gradient(145deg, var(--card-bg-start), var(--card-bg-end));
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 
                0 25px 50px -12px rgba(0, 0, 0, 0.7),
                0 10px 20px -5px rgba(0, 0, 0, 0.5),
                inset 0 1px 1px rgba(255, 255, 255, 0.1),
                inset 0 0 20px rgba(0, 242, 255, 0.03);
        }

        .glass-panel-white {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .match-card {
            background: linear-gradient(90deg, rgba(255,255,255,0.03) 0%, rgba(255,255,255,0.07) 50%, rgba(255,255,255,0.03) 100%);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .text-neon {
            color: var(--neon-green);
            text-shadow: 0 0 15px rgba(57, 255, 20, 0.6);
        }

        .bg-neon {
            background-color: var(--neon-green);
        }

        .border-neon {
            border-color: var(--neon-green);
        }

        .shadow-neon {
            box-shadow: 0 0 15px rgba(57, 255, 20, 0.6);
        }

        .stats-cyan {
            color: var(--cyan-stats);
            text-shadow: 0 0 10px rgba(0, 242, 255, 0.3);
        }

        .text-gold {
            color: var(--gold);
            text-shadow: 0 0 15px var(--gold-glow);
        }

        .bg-gold {
            background-color: var(--gold);
        }

        .border-gold {
            border-color: var(--gold);
        }

        .vertical-divider {
            border-right: 1px solid rgba(0, 242, 255, 0.2);
        }

        .ucl-row-gradient {
            background: linear-gradient(90deg, rgba(255, 255, 255, 0.03) 0%, rgba(255, 255, 255, 0) 100%);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .geometric-bg {
            position: relative;
            overflow: hidden;
        }

        .geometric-bg::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 80%;
            height: 200%;
            background: radial-gradient(ellipse at center, rgba(0, 242, 255, 0.03) 0%, transparent 70%);
            transform: rotate(-15deg);
            pointer-events: none;
        }

        .ucl-carpet {
            background-color: #0c18a5;
            background-image: radial-gradient(circle at center, #152bbd 0%, #0a1781 100%), url('https://www.transparenttextures.com/patterns/felt.png');
        }

        .glass-bowl {
            background: radial-gradient(circle at 50% 40%, rgba(255, 255, 255, 0.15), rgba(255, 255, 255, 0.02));
            box-shadow: inset 0 0 40px rgba(255, 255, 255, 0.2), 0 20px 50px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .reveal-paper {
            animation: unfold 0.6s cubic-bezier(0.23, 1, 0.32, 1) forwards;
            transform-origin: top;
        }

        @keyframes unfold {
            0% { transform: scaleY(0.5) translateY(-30px); opacity: 0; filter: blur(10px); }
            100% { transform: scaleY(1) translateY(0); opacity: 1; filter: blur(0); }
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 5px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: var(--neon-green);
        }

        .logo-glow {
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.6);
        }

        .btn-gradient {
            background: linear-gradient(180deg, #00ff88 0%, #00cc6a 100%);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* World Cup Styles */
        .wc-bg {
            background: radial-gradient(circle at top, #002266 0%, #001640 100%);
        }
        .wc-glass {
            background: rgba(0, 22, 64, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(212, 175, 55, 0.3);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }
        .wc-gold-text {
            color: #d4af37;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
        }
        .wc-ball {
            background: radial-gradient(circle at 30% 30%, #ffffff, #d4af37);
            box-shadow: inset -5px -5px 15px rgba(0,0,0,0.5), 0 5px 15px rgba(0,0,0,0.5);
        }
        .wc-shake {
            animation: wc-shake 0.4s infinite;
        }
        @keyframes wc-shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }
        .animate-spin-slow {
            animation: spin 8s linear infinite;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
<script type="importmap">

</head>

</body>
</html>
